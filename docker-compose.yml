services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whale-eye-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: whale-eye-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
